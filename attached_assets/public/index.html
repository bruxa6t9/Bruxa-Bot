<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BruxaBot Dashboard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; padding: 30px; }
      h1 { color: #00e676; margin-bottom: 5px; }
      .subtitle { color: #aaa; margin-bottom: 25px; font-size: 14px; }
      .stats-bar { display: flex; gap: 15px; margin-bottom: 25px; }
      .stat-box {
        background: #1a1a1a; padding: 15px 20px; border-radius: 10px;
        border: 1px solid #2a2a2a; flex: 1; text-align: center;
      }
      .stat-box h2 { color: #00e676; font-size: 28px; }
      .stat-box p { color: #aaa; font-size: 13px; margin-top: 4px; }
      .section-header {
        display: flex; justify-content: space-between;
        align-items: center; margin-bottom: 15px;
      }
      .refresh-btn {
        background: #1a1a1a; color: #00e676; border: 1px solid #00e676;
        padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
      }
      .bots-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;
      }
      .bot-card {
        background: #1a1a1a; border-radius: 10px; padding: 18px;
        border: 1px solid #2a2a2a; transition: border 0.2s;
      }
      .bot-card:hover { border-color: #00e676; }
      .bot-card h3 {
        margin-bottom: 10px; font-size: 16px;
        display: flex; align-items: center; gap: 8px;
      }
      .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .online { background: #00e676; box-shadow: 0 0 8px #00e676; }
      .offline { background: #555; }
      .info { font-size: 13px; color: #aaa; margin-top: 6px; }
      .info span { color: #fff; }
      .info span.masked { color: #888; letter-spacing: 2px; }
      .badge {
        display: inline-block; padding: 2px 8px; border-radius: 20px;
        font-size: 11px; font-weight: bold; margin-top: 8px;
      }
      .badge-online { background: #003d1f; color: #00e676; border: 1px solid #00e676; }
      .badge-offline { background: #2a2a2a; color: #aaa; border: 1px solid #444; }
      .admin-uids { font-size: 12px; color: #888; margin-top: 4px; word-break: break-all; }
      .btn-delete {
        background: #ff1744; color: #fff; font-size: 12px;
        padding: 6px 12px; border-radius: 5px; border: none;
        cursor: pointer; margin-top: 12px;
      }
      .btn-delete:hover { background: #d50000; }
      .no-bots { color: #aaa; text-align: center; padding: 40px; background: #1a1a1a; border-radius: 10px; }
    </style>
  </head>
  <body>
    <h1>👾 BruxaBot Dashboard</h1>
    <p class="subtitle">Monitor all connected BruxaBots</p>

    <div class="stats-bar">
      <div class="stat-box">
        <h2 id="totalBots">0</h2>
        <p>Total Bots</p>
      </div>
      <div class="stat-box">
        <h2 id="onlineBots" style="color: #00e676">0</h2>
        <p>Online Bots</p>
      </div>
      <div class="stat-box">
        <h2 id="offlineBots" style="color: #aaa">0</h2>
        <p>Offline Bots</p>
      </div>
    </div>

    <div class="section-header">
      <h3>🤖 All Bots</h3>
      <button class="refresh-btn" onclick="loadBots()">🔄 Refresh</button>
    </div>
    <div class="bots-grid" id="botsList"></div>

    <script>
      async function loadBots() {
        const res = await fetch('/api/bots');
        const bots = await res.json();
        const container = document.getElementById('botsList');

        document.getElementById('totalBots').innerText = bots.length;
        document.getElementById('onlineBots').innerText = bots.filter(b => b.status === 'online').length;
        document.getElementById('offlineBots').innerText = bots.filter(b => b.status === 'offline').length;

        container.innerHTML = '';

        if (bots.length === 0) {
          container.innerHTML = `<div class="no-bots">No bots registered yet. Start a bot to see it here!</div>`;
          return;
        }

        bots.forEach(bot => {
          const isOnline = bot.status === 'online';
          const lastSeen = bot.lastSeen ? new Date(bot.lastSeen).toLocaleString() : 'Never';
          const adminUids = bot.adminUids?.join(', ') || 'N/A';
          const maskedPassword = bot.botPassword ? '••••••••' : 'N/A';

          container.innerHTML += `
            <div class="bot-card">
              <h3>
                <span class="status ${isOnline ? 'online' : 'offline'}"></span>
                ${bot.botName || 'Not Registered Yet'}
              </h3>
              <span class="badge ${isOnline ? 'badge-online' : 'badge-offline'}">
                ${isOnline ? '🟢 Online' : '⚫ Offline'}
              </span>
              <div class="info">Bot UID: <span>${bot.botUids || 'N/A'}</span></div>
              <div class="info">Email: <span>${bot.email || 'N/A'}</span></div>
              <div class="info">Password: <span class="masked">${maskedPassword}</span></div>
              <div class="info">Prefix: <span>${bot.prefix || 'N/A'}</span></div>
              <div class="info">Language: <span>${bot.language || 'N/A'}</span></div>
              <div class="info">Timezone: <span>${bot.timeZone || 'N/A'}</span></div>
              <div class="info">Last Seen: <span>${lastSeen}</span></div>
              <div class="info">Admin UIDs:</div>
              <div class="admin-uids">${adminUids}</div>
              <button class="btn-delete" onclick="deleteBot('${bot.botUids}')">🗑 Delete</button>
            </div>
          `;
        });
      }

      async function deleteBot(botUids) {
        if (!confirm('Delete this bot?')) return;
        await fetch(`/api/bots/${botUids}`, { method: 'DELETE' });
        loadBots();
      }

      loadBots();
      setInterval(loadBots, 30000);
    </script>
  </body>
</html>
